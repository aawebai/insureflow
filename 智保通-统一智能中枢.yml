        prompt_template:
        - id: hub-h1-sys-001
          role: system
          text: |
            你是 InsureFlow 智能保险中台的意图识别与实体提取引擎。分析用户输入，输出精确的路由指令和实体信息。

            ## 意图分类规则

            1. **product_config** — 产品配置
               触发词：配置/设计/创建产品、生成产品定义、帮我做一款保险产品、新产品上线
               判断：用户描述"想做什么样的产品"而非"我想买XX保险"

            2. **underwriting** — 核保评估
               触发词：投保/核保/买保险/能过吗/审核/评估风险、我的职业是/年龄/健康状况、想买XX万重疾险
               判断：用户提供个人信息并询问是否能投保

            3. **policy_service** — 保单服务
               触发词：保单/理赔/续保/条款/保障范围/能赔吗/怎么赔/缴费/复效/退保/忘记缴费
               判断：用户已有保单或询问保单相关服务

            4. **full_chain** — 全链路体验
               触发词：全流程/全链路/完整体验/从选产品到保单/一站式/完整走一遍
               判断：用户明确表示想体验完整的保险业务流程

            5. **general** — 通用问答/信息不足
               触发词：你好/帮助/能做什么/保险是什么/谢谢
               判断：闲聊、问候、信息太少无法归类

            ## 实体提取（根据用户输入尽可能提取）

            根据意图类型提取对应实体：
            - product_config: {product_type, target_age_range, target_income_range, special_features, competitor_reference}
            - underwriting: {age, gender, occupation, health_conditions, target_product_type, desired_sum_insured}
            - policy_service: {inquiry_type: "lookup"|"coverage"|"claim"|"renewal"|"change"|"complaint", policy_type, health_mention}
            - full_chain: {starting_stage: "product"|"underwriting"|"policy", preferences}
            - general: {topic, needs_guidance: true/false}

            输出必须是合法JSON，不包含任何其他文字。
          role: system
        - id: hub-h1-usr-001
          role: user
          text: |
            用户输入：{{#1792000000001.user_input#}}

            请识别意图并提取实体。
        - id: hub-h1-ast-001
          role: assistant
          text: '{
            "intent":'
        reasoning_format: tagged
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 1000
        selected: false
        structured_output_enabled: true
        title: LLM_H1:意图识别
        type: llm
        vision:
          enabled: false
      height: 116
      id: '1792000000002'
      position:
        x: 382
        y: 291
      positionAbsolute:
        x: 382
        y: 291
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json
          import re

          def main(llm_output: str) -> dict:
              """解析LLM意图识别输出，构造知识库查询"""
              raw = llm_output
              if isinstance(raw, str):
                  raw = re.sub(r"<think>.*?</think>", "", raw, flags=re.DOTALL).strip()
                  start = raw.find("{")
                  end = raw.rfind("}") + 1
                  if start >= 0 and end > start:
                      try:
                          data = json.loads(raw[start:end])
                      except:
                          data = {"intent": "general", "confidence": 0.0, "entities": {}, "needs_clarification": True}
                  else:
                      data = {"intent": "general", "confidence": 0.0, "entities": {}}
              elif isinstance(raw, dict):
                  data = raw
              else:
                  data = {"intent": "general", "confidence": 0.0, "entities": {}}

              intent = data.get("intent", "general")
              entities = data.get("entities", {})

              if intent == "product_config":
                  product_type = entities.get("product_type", "")
                  query_parts = []
                  if product_type:
                      query_parts.append(f"{product_type} 监管规定 合规要求 等待期 免责条款")
                      query_parts.append(f"{product_type} 市场产品参数 竞品对比 价格区间")
                      query_parts.append(f"{product_type} 标准条款模板 费率定价指导原则")
                  if not query_parts:
                      query_parts.append("保险产品配置 监管规定 竞品参数 条款模板 费率定价")
                  search_query = "；".join(query_parts)

              elif intent == "underwriting":
                  product_type = entities.get("target_product_type", "")
                  health_conditions = entities.get("health_conditions", [])
                  occupation = entities.get("occupation", "")
                  query_parts = []
                  if product_type:
                      query_parts.append(f"{product_type} 核保规则 职业风险等级 健康核保标准")
                      query_parts.append(f"产品-核保规则映射 {product_type}")
                  else:
                      query_parts.append("核保规则 职业风险等级 健康核保标准 BMI吸烟年龄")
                  if occupation:
                      query_parts.append(f"职业 {occupation} 风险等级 核保")
                  if health_conditions and isinstance(health_conditions, list):
                      for hc in health_conditions:
                          query_parts.append(f"{hc} 核保 加费 除外 承保")
                  query_parts.append("综合核保决策标准 标准体 次标准体 延期体 拒保体 替代方案")
                  search_query = "；".join(query_parts)

              elif intent == "policy_service":
                  inquiry_type = entities.get("inquiry_type", "lookup")
                  policy_type = entities.get("policy_type", "")
                  health_mention = entities.get("health_mention", "")
                  query_parts = []
                  if inquiry_type == "claim":
                      query_parts.append("理赔流程 理赔材料 理赔时效 常见拒赔案例 拒赔原因")
                  elif inquiry_type == "coverage":
                      query_parts.append("保单条款 保障范围 免责条款 等待期 赔付条件")
                  elif inquiry_type == "renewal":
                      query_parts.append("续保规则 宽限期 复效条件 保费调整 续保流程")
                  elif inquiry_type == "lookup":
                      query_parts.append("保单查询 保单服务 保单变更 缴费信息 退保规则")
                  else:
                      query_parts.append("保单服务 保单条款 理赔指南 续保规则 常见问题")
                  if policy_type:
                      query_parts.append(f"{policy_type} 条款 保障范围 理赔条件")
                  if health_mention:
                      query_parts.append(f"{health_mention} 保障范围 理赔条件 免责")
                  query_parts.append("全链路FAQ 跨模块问题")
                  search_query = "；".join(query_parts)

              elif intent == "full_chain":
                  starting_stage = entities.get("starting_stage", "product")
                  query_parts = ["全链路保险服务 全链路FAQ"]
                  if starting_stage == "product":
                      query_parts.append("保险产品配置 产品定义 监管规定 竞品参数 条款模板")
                  elif starting_stage == "underwriting":
                      query_parts.append("核保规则 职业风险评估 健康核保标准 产品-核保规则映射")
                  else:
                      query_parts.append("保单服务 理赔指引 续保规则 核保决策-保单生成映射")
                  search_query = "；".join(query_parts)

              else:
                  search_query = "保险基础知识 产品类型介绍 核保流程说明 保单服务介绍 常见问题"

              return {
                  "intent": intent,
                  "entities_json": json.dumps(entities, ensure_ascii=False),
                  "search_query": search_query
              }
        code_language: python3
        outputs:
          intent:
            children: null
            type: string
          entities_json:
            children: null
            type: string
          search_query:
            children: null
            type: string
        selected: false
        title: Code_H1:上下文解析
        type: code
        variables:
        - value_selector:
          - '1792000000002'
          - text
          value_type: string
          variable: llm_output
      height: 51
      id: '1792000000003'
      position:
        x: 687
        y: 282
      positionAbsolute:
        x: 687
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
