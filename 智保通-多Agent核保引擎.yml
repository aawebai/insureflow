    - data:
        code: "import json\nimport re\nfrom typing import Union\n\ndef safe_parse(raw)\
          \ -> dict:\n    \"\"\"安全解析LLM输出的JSON（清洗think标签）\"\"\"\n    if raw is None:\n\
          \        return {}\n    if isinstance(raw, dict):\n        return raw\n\
          \    if isinstance(raw, str):\n        raw = re.sub(r\"<think>.*?</think>\"\
          , \"\", raw, flags=re.DOTALL).strip()\n        # 提取第一个JSON对象\n        start\
          \ = raw.find(\"{\")\n        end = raw.rfind(\"}\") + 1\n        if start\
          \ >= 0 and end > start:\n            try:\n                return json.loads(raw[start:end])\n\
          \            except:\n                pass\n    return {}\n\ndef extract_age_coefficient(age:\
          \ int) -> float:\n    \"\"\"年龄风险系数\"\"\"\n    if age <= 17:\n        return\
          \ 0.8\n    elif age <= 40:\n        return 1.0\n    elif age <= 55:\n  \
          \      return 1.3\n    elif age <= 65:\n        return 1.6\n    else:\n\
          \        return 2.0\n\ndef extract_smoking_coefficient(smoking: str) ->\
          \ float:\n    \"\"\"吸烟风险系数\"\"\"\n    if smoking == \"有\":\n        return\
          \ 1.15\n    return 1.0\n\ndef extract_occupation_adjustment(occ_risk: dict)\
          \ -> float:\n    \"\"\"从职业风险评估结果中提取加费比例（小数形式）\"\"\"\n    adjustment_str\
          \ = str(occ_risk.get(\"adjustment\", \"0%\"))\n    # 优先取数字部分\n    nums =\
          \ re.findall(r\"[\\d.]+\", adjustment_str)\n    if nums:\n        return\
          \ float(nums[0]) / 100.0\n    return 0.0\n\ndef extract_health_adjustment(health_risk:\
          \ dict) -> float:\n    \"\"\"从健康风险评估结果中提取加费比例\"\"\"\n    adjustment_str\
          \ = str(health_risk.get(\"adjustment\", \"0%\"))\n    nums = re.findall(r\"\
          [\\d.]+\", adjustment_str)\n    if nums:\n        return float(nums[0])\
          \ / 100.0\n    return 0.0\n\ndef main(occupation_risk_json: Union[str, dict],\
          \ health_risk_json: Union[str, dict], user_data: Union[str, dict],\
