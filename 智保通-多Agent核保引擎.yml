          \    health = safe_parse(health_risk_json)\n    user = safe_parse(user_data)\n\
          \    product_ctx = safe_parse(product_context_json) if product_context_json else {}\n\
          \    \n    # 提取用户信息\n    age_raw = user.get(\"age\", 30)\n    try:\n   \
