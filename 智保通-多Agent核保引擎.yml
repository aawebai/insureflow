          女\" else \"male\"\n    age_brackets = sorted(default_table[gender_key].keys())\n\
          \    nearest_age = min(age_brackets, key=lambda x: abs(x - age))\n    base_rate\
          \ = default_table[gender_key][nearest_age]\n    \n    # 计算风险系数\n    occ_adj\
