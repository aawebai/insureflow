    - data:
        code: |
          import json
          import re

          def main(llm_output: str) -> dict:
              raw = llm_output if isinstance(llm_output, str) else str(llm_output)
              raw = re.sub(r"<think>.*?</think>", "", raw, flags=re.DOTALL).strip()
              start = raw.find("{")
              end = raw.rfind("}") + 1
              if start >= 0 and end > start:
                  try:
                      data = json.loads(raw[start:end])
                  except:
                      data = {}
              else:
                  data = {}

              user_profile = data.get("user_profile", {})
              insurance_request = data.get("insurance_request", {})
              product_requirement_text = data.get("product_requirement_text", "")

              if not product_requirement_text:
                  target_type = insurance_request.get("target_product_type", "重疾险")
                  sum_insured = insurance_request.get("desired_sum_insured", "50万")
                  special = insurance_request.get("special_preferences", [])
                  special_str = "，含" + "、".join(special) if special else ""
                  product_requirement_text = f"配置一款{target_type}，保额{sum_insured}{special_str}，价格有竞争力，目标客群匹配用户画像"

              request_body_a = json.dumps({
                  "inputs": {
                      "product_requirement": product_requirement_text
                  },
                  "response_mode": "blocking",
                  "user": "insureflow-auto"
              }, ensure_ascii=False)

              age = user_profile.get("age", "")
              gender = user_profile.get("gender", "")
              occupation = user_profile.get("occupation", "")
              health = user_profile.get("health_conditions", [])
              health_str = "，".join(health) if health else "无异常"
              target_type = insurance_request.get("target_product_type", "重疾险")
              sum_insured = insurance_request.get("desired_sum_insured", "50万")
              smoking = user_profile.get("smoking", "未知")

              insure_inquiry = f"年龄{age}，性别{gender}，职业{occupation}，健康状况：{health_str}，吸烟：{smoking}，想买{sum_insured}{target_type}"

              return {
                  "request_body_a": request_body_a,
                  "user_profile_json": json.dumps(user_profile, ensure_ascii=False),
                  "insurance_request_json": json.dumps(insurance_request, ensure_ascii=False),
                  "insure_inquiry": insure_inquiry
              }
        code_language: python3
        outputs:
          request_body_a:
            children: null
            type: string
          user_profile_json:
            children: null
            type: string
          insurance_request_json:
            children: null
            type: string
          insure_inquiry:
            children: null
            type: string
        selected: false
        title: Code:提取信息+构造请求A
        type: code
