        prompt_template:
        - id: sys-extract
          role: system
          text: |
            你是一个保险信息结构化提取器。从用户的自然语言输入中提取全链路所需的所有字段。

            提取要求：
            1. 所有字段尽可能填写，未提及的填null
            2. 健康信息如实提取，不要修改用户原话
            3. 如果用户提到了某个疾病但不确定严重程度，记录为"用户自述：XXX"

            输出JSON格式：
            {
              "user_profile": {
                "age": 数字或null,
                "gender": "男"|"女"|null,
                "occupation": "具体职业名称"或null,
                "health_conditions": ["健康状况列表"],
                "smoking": "有"|"无"|"未知",
                "bmi": 数字或null
              },
              "insurance_request": {
                "target_product_type": "重疾险"|"医疗险"|"定期寿险"|"意外险"|null,
                "desired_sum_insured": "保额+单位，如50万"或null,
                "budget_range": "预算描述"或null,
                "special_preferences": ["偏好列表，如轻症豁免、多次赔付"],
                "payment_preference": "月缴"|"年缴"|null
              },
              "product_requirement_text": "构造给模块A的产品需求描述（包含险种、客群、保额范围、特色条款、价格定位）"
            }

            输出必须是合法JSON，不包含任何其他文字。
        - id: usr-extract
          role: user
          text: |
            用户输入：{{#1731000000001.user_input#}}

            请提取所有字段并构造产品需求描述。
        - id: ast-extract
          role: assistant
          text: '{'
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 1000
        selected: false
        structured_output_enabled: false
        title: LLM:信息结构化提取
        type: llm
        vision:
          enabled: false
      height: 87
